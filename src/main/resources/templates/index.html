<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый кошелек</title>
    <!-- Bootstrap CSS (красивые кнопки и таблицы) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">

            <!-- Заголовок -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h2 class="text-center">💰 Финансовый кошелек</h2>
                </div>
                <div class="card-body">
                    <!-- Баланс -->
                    <h3 class="text-center mb-4">
                        Текущий баланс:
                        <span th:text="${balance}" class="badge bg-success fs-4">0.0</span> ₽
                    </h3>
                </div>
            </div>

            <!-- Форма добавления транзакции -->
            <div class="card mb-4">
                <div class="card-header bg-success text-white">
                    <h4>➕ Добавить новую транзакцию</h4>
                </div>
                <div class="card-body">
                    <form action="#" th:action="@{/web/add}" method="post" class="row g-3">

                        <!-- Сумма -->
                        <div class="col-md-3">
                            <label class="form-label">Сумма</label>
                            <input type="number" step="0.01" class="form-control"
                                   name="amount" required>
                        </div>

                        <!-- Дата -->
                        <div class="col-md-3">
                            <label class="form-label">Дата</label>
                            <input type="datetime-local" class="form-control"
                                   name="date" required>
                        </div>

                        <!-- Описание -->
                        <div class="col-md-3">
                            <label class="form-label">Описание</label>
                            <input type="text" class="form-control"
                                   name="description" required>
                        </div>

                        <!-- Тип (доход/расход) -->
                        <div class="col-md-2">
                            <label class="form-label">Тип</label>
                            <select class="form-select" name="type">
                                <option value="INCOME">💰 Доход</option>
                                <option value="EXPENSE">💸 Расход</option>
                            </select>
                        </div>

                        <!-- Кнопка -->
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">➕</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Таблица транзакций -->
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h4>📋 История операций</h4>
                </div>
                <div class="card-body">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Дата</th>
                            <th>Описание</th>
                            <th>Сумма</th>
                            <th>Тип</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="t : ${transactions}">
                            <td th:text="${t.id}">1</td>
                            <td th:text="${t.date}">2026-03-15</td>
                            <td th:text="${t.description}">Зарплата</td>
                            <td th:text="${t.amount}"
                                th:class="${t.type.name() == 'INCOME' ? 'text-success' : 'text-danger'}">
                                5000
                            </td>
                            <td>
                                    <span th:if="${t.type.name() == 'INCOME'}"
                                          class="badge bg-success">Доход</span>
                                <span th:if="${t.type.name() == 'EXPENSE'}"
                                      class="badge bg-danger">Расход</span>
                            </td>
                            <td>
                                <a th:href="@{'/web/delete/' + ${t.id}}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Удалить транзакцию?')">
                                    ❌
                                </a>
                            </td>
                        </tr>

                        <!-- Если транзакций нет -->
                        <tr th:if="${transactions.isEmpty()}">
                            <td colspan="6" class="text-center text-muted">
                                Пока нет транзакций. Добавьте первую!
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS для интерактивных компонентов -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
